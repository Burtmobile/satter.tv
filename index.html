<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frans op z'n AI's · French the AI Way</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,700;1,300;1,600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold:       #c8952a;
  --gold-light: #e8c87a;
  --cream:      #f5f0e8;
  --ink:        #1a1814;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
}

body {
  background: linear-gradient(
    to bottom,
    #020510 0%,
    #06091e 28%,
    #090c26 55%,
    #10091e 78%,
    #1a0c14 90%,
    #220e08 100%
  );
  color: #f0ece4;
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  position: relative;
}

/* ── Stars canvas ─────────────────────────────────────── */
#star-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

/* ── Skyline ──────────────────────────────────────────── */
.skyline-wrap {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  z-index: 2;
  pointer-events: none;
  line-height: 0;
}
.skyline-wrap svg {
  display: block;
  width: 100%;
  height: auto;
}

/* ── Content overlay ──────────────────────────────────── */
.content {
  position: relative;
  z-index: 3;
  width: 100%;
  max-width: 660px;
  padding: 48px 24px calc(28vw + 10px);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

/* ── Return banner ────────────────────────────────────── */
.return-banner {
  background: rgba(12,10,20,0.82);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(200,149,42,0.22);
  border-radius: 4px;
  padding: 12px 16px;
  margin-bottom: 40px;
  width: 100%;
  max-width: 520px;
  display: none;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  text-align: left;
  opacity: 0;
  transition: opacity 0.5s ease 0.2s;
}
.return-banner.show    { display: flex; }
.return-banner.visible { opacity: 1; }
.rb-text { font-size: 11.5px; color: rgba(200,185,165,0.75); line-height: 1.6; }
.rb-text strong { color: #fff; display: block; font-size: 12px; margin-bottom: 1px; }
.rb-btn {
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--gold);
  color: var(--ink);
  font-family: 'DM Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 8px 14px;
  border-radius: 2px;
  text-decoration: none;
  font-weight: 500;
  white-space: nowrap;
  transition: background 0.2s;
}
.rb-btn:hover { background: var(--gold-light); }

/* ── Flag ─────────────────────────────────────────────── */
.flag-row {
  display: flex;
  gap: 3px;
  height: 18px;
  justify-content: center;
  margin-bottom: 22px;
  opacity: 0;
  transform: translateY(-7px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}
.flag-row.vis { opacity: 1; transform: translateY(0); }
.flag-row div { width: 10px; border-radius: 2px; }
.flag-row .b  { background: #1a4a9e; }
.flag-row .w  { background: rgba(235,228,215,0.8); }
.flag-row .r  { background: #c1121f; }

/* ── Site name ────────────────────────────────────────── */
.site-name {
  font-family: 'Fraunces', serif;
  font-weight: 700;
  font-size: clamp(1rem, 3.2vw, 1.45rem);
  letter-spacing: -0.02em;
  color: rgba(240,235,225,0.88);
  text-shadow: 0 0 40px rgba(200,149,42,0.18);
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.7s ease 0.15s, transform 0.7s ease 0.15s;
}
.site-name.vis { opacity: 1; transform: translateY(0); }
.site-name .g  { color: var(--gold); }
.site-name .s  { color: rgba(255,255,255,0.18); margin: 0 10px; font-weight: 300; font-size: 0.82em; }

/* ── Quote ────────────────────────────────────────────── */
.quote-block {
  margin: 38px 0 6px;
  opacity: 0;
  transition: opacity 0.5s ease;
}
.quote-block.vis { opacity: 1; }

.quote-text {
  font-family: 'Fraunces', serif;
  font-size: clamp(1.55rem, 5.2vw, 2.65rem);
  font-weight: 300;
  font-style: italic;
  line-height: 1.22;
  letter-spacing: -0.025em;
  color: #f5f0e8;
  min-height: 3.6em;
  text-shadow: 0 2px 24px rgba(0,0,0,0.6);
}

.cursor {
  display: inline-block;
  width: 3px; height: 0.82em;
  background: var(--gold);
  margin-left: 3px;
  vertical-align: middle;
  border-radius: 1px;
  animation: blink 0.75s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.quote-attr {
  margin-top: 10px;
  font-size: 11px;
  letter-spacing: 0.14em;
  font-family: 'Fraunces', serif;
  font-style: italic;
  color: rgba(210,195,165,0.70);
  text-align: center;
  opacity: 0;
  transition: opacity 0.6s ease;
}
.quote-attr.vis { opacity: 1; }


/* ── Divider ornament ─────────────────────────────────── */
.divider {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 30px auto 20px;
  max-width: 210px;
  width: 100%;
  opacity: 0;
  transition: opacity 0.5s ease;
}
.divider.vis { opacity: 1; }
.divider-line { flex: 1; height: 1px; background: rgba(200,149,42,0.22); }
.divider-gem  {
  width: 6px; height: 6px;
  background: rgba(200,149,42,0.55);
  transform: rotate(45deg);
  border-radius: 1px;
}

/* ── Choose label ─────────────────────────────────────── */
.choose-lbl {
  font-size: 9.5px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 18px;
  opacity: 0;
  transition: opacity 0.5s ease;
}
.choose-lbl.vis { opacity: 1; }

/* ── Language cards ───────────────────────────────────── */
.lang-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 13px;
  max-width: 500px;
  width: 100%;
  opacity: 0;
  transform: translateY(18px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.lang-grid.vis { opacity: 1; transform: translateY(0); }

.lang-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 9px;
  padding: 26px 16px 22px;
  background: rgba(6,9,24,0.72);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px;
  text-decoration: none;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
}
.lang-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 0;
  background: linear-gradient(to top, rgba(200,149,42,0.1), transparent);
  transition: height 0.3s ease;
}
.lang-card:hover {
  border-color: rgba(200,149,42,0.4);
  background: rgba(12,16,36,0.88);
  box-shadow: 0 0 28px rgba(200,149,42,0.1), 0 8px 32px rgba(0,0,0,0.35);
}
.lang-card:hover::after { height: 100%; }

.card-flag {
  font-size: 33px;
  line-height: 1;
  position: relative;
  z-index: 1;
  transition: transform 0.25s ease;
}
.lang-card:hover .card-flag { transform: scale(1.1) rotate(-3deg); }

.card-name {
  font-family: 'Fraunces', serif;
  font-size: 1.2rem;
  font-weight: 600;
  color: rgba(240,235,225,0.92);
  position: relative; z-index: 1;
  transition: color 0.22s;
}
.lang-card:hover .card-name { color: var(--gold-light); }

.card-sub {
  font-size: 10px;
  letter-spacing: 0.05em;
  color: rgba(185,172,150,0.5);
  position: relative; z-index: 1;
  transition: color 0.22s;
}
.lang-card:hover .card-sub { color: rgba(185,172,150,0.8); }

.card-arr {
  margin-top: 4px;
  font-size: 0.85rem;
  color: rgba(200,149,42,0.55);
  position: relative; z-index: 1;
  transition: transform 0.22s, color 0.22s;
}
.lang-card:hover .card-arr { transform: translateX(5px); color: var(--gold); }

.prev-badge {
  display: none;
  position: absolute;
  top: 8px; right: 8px;
  font-size: 8px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold);
  border: 1px solid rgba(200,149,42,0.3);
  padding: 2px 7px;
  border-radius: 20px;
  z-index: 2;
}

/* ── Switch row ───────────────────────────────────────── */
.switch-row {
  margin-top: 20px;
  font-size: 10.5px;
  color: rgba(180,168,148,0.38);
  opacity: 0;
  transition: opacity 0.5s ease;
}
.switch-row.vis { opacity: 1; }
.switch-row button {
  background: none; border: none; cursor: pointer;
  color: rgba(180,168,148,0.38);
  font-family: 'DM Mono', monospace;
  font-size: 10.5px;
  text-decoration: underline; padding: 0;
}
.switch-row button:hover { color: rgba(240,232,220,0.65); }

/* ── Responsive ───────────────────────────────────────── */
@media (max-width: 480px) {
  .lang-grid { grid-template-columns: 1fr; max-width: 270px; }
  .site-name .s { display: none; }
  .content { padding-bottom: calc(30vw + 10px); }
}
@media (min-width: 1600px) {
  .content { padding-bottom: calc(26vw + 10px); }
}
</style>

<!-- ══ PARIS SKYLINE SVG ══════════════════════════════════════════════ -->

    <stop offset="100%" stop-color="#260e06" stop-opacity="0.9"/>
  </linearGradient>
  <!-- Eiffel golden glow (base bloom) -->
  <radialGradient id="tglow" cx="50%" cy="90%" r="60%">
    <stop offset="0%" stop-color="#c8952a" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#c8952a" stop-opacity="0"/>
  </radialGradient>
  <!-- Tower body gradient: warm gold at top, richer amber mid, dark base -->
  <linearGradient id="towergrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#b8832a"/>
    <stop offset="30%"  stop-color="#9a6820"/>
    <stop offset="65%"  stop-color="#7a5018"/>
    <stop offset="100%" stop-color="#3a2408"/>
  </linearGradient>
  <!-- Rising ambient column of light above the tower -->
  <linearGradient id="tcolumn" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#c8952a" stop-opacity="0"/>
    <stop offset="100%" stop-color="#c8952a" stop-opacity="0.18"/>
  </linearGradient>
  <!-- Platform 1 glow (top) -->
  <linearGradient id="platglow1" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#f0c060" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#f0c060" stop-opacity="0"/>
  </linearGradient>
  <!-- Platform 2 glow (main) -->
  <linearGradient id="platglow2" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#f0c060" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#f0c060" stop-opacity="0"/>
  </linearGradient>
  <!-- Moon glow -->
  <radialGradient id="mglow" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#fff8e0" stop-opacity="0.9"/>
    <stop offset="40%"  stop-color="#ffe8a0" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#ffe070" stop-opacity="0"/>
  </radialGradient>
  <!-- Mist gradient at base -->
  <linearGradient id="mist" x1="0" y1="1" x2="0" y2="0">
    <stop offset="0%"  stop-color="#0e0818" stop-opacity="0.7"/>
    <stop offset="60%" stop-color="#0e0818" stop-opacity="0"/>
  </linearGradient>
  <!-- Seine shimmer -->
  <linearGradient id="seine" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#080c22" stop-opacity="0"/>
    <stop offset="30%"  stop-color="#1a2060" stop-opacity="0.35"/>
    <stop offset="50%"  stop-color="#2030a0" stop-opacity="0.18"/>
    <stop offset="70%"  stop-color="#1a2060" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#080c22" stop-opacity="0"/>
  </linearGradient>
  <!-- Tower beacon glow filter -->
  <filter id="beacon" x="-150%" y="-150%" width="400%" height="400%">
    <feGaussianBlur stdDeviation="5"/>
  </filter>
  <!-- Soft building edge blur -->
  <filter id="softedge" x="0%" y="0%" width="100%" height="100%">
    <feGaussianBlur stdDeviation="0.5"/>
  </filter>
</defs>

<!-- ══ CONTENT ════════════════════════════════════════════════════════ -->
<div class="content">

      <strong id="rb-title"></strong>

  </div>

  <!-- Mini French flag -->

    <div class="b"></div><div class="w"></div><div class="r"></div>
  </div>

  <!-- Bilingual site name -->
  <div class="site-name" id="site-name">
    Frans op z'n <span class="g">AI's</span>
    <span class="s">·</span>
    French the <span class="g">AI Way</span>
  </div>

  <!-- Quote + typewriter -->
  <div class="quote-block" id="quote-block">
    <div class="quote-text">
      <span id="typed"></span><span class="cursor" id="cursor"></span>
    </div>
    <div class="quote-attr" id="quote-attr">— Ernest Hemingway</div>
  </div>

  <!-- Ornament divider -->
  <div class="divider" id="divider">
    <div class="divider-line"></div>
    <div class="divider-gem"></div>
    <div class="divider-gem" style="opacity:.38;transform:rotate(45deg) scale(.58)"></div>
    <div class="divider-gem"></div>
    <div class="divider-line"></div>
  </div>

  <!-- Choose label -->
  <div class="choose-lbl" id="choose-lbl">Kies je taal &nbsp;·&nbsp; Choose your language</div>

  <!-- Language cards -->
  <div class="lang-grid" id="lang-grid">
    <a class="lang-card" href="index-nl.html" id="card-nl" onclick="saveLang('nl')">
      <div class="prev-badge" id="badge-nl">← Vorige keuze</div>
      <div class="card-flag">🇳🇱</div>
      <div class="card-name">Nederlands</div>
      <div class="card-arr">→</div>
    </a>
    <a class="lang-card" href="index_en.html" id="card-en" onclick="saveLang('en')">
      <div class="prev-badge" id="badge-en">← Previous choice</div>
      <div class="card-flag">🇬🇧</div>
      <div class="card-name">English</div>
      <div class="card-arr">→</div>
    </a>
  </div>

  <!-- Switch language -->
  <div class="switch-row" id="switch-row" style="display:none">
    Andere voorkeur? &nbsp;
    <button onclick="clearLang()">Taal wisselen · Switch language</button>
  </div>

<script>
// ══ CONFIG ═══════════════════════════════════════════════════════════
const QUOTE  = "Paris est une fête.";
const NL_URL = 'index-nl.html';
const EN_URL = 'index_en.html';
const LS_KEY = 'fransLang';

// ══ STARS ═════════════════════════════════════════════════════════════
(function () {
  const cv  = document.getElementById('star-canvas');
  const ctx = cv.getContext('2d');

  function size() {
    cv.width  = window.innerWidth;
    cv.height = window.innerHeight;
  }
  size();
  window.addEventListener('resize', size);

  // Generate stars — only upper 70% of screen (sky area)
  const TOTAL = 210;
  const stars = Array.from({ length: TOTAL }, () => ({
    x:     Math.random(),
    y:     Math.random() * 0.70,
    r:     0.35 + Math.random() * 1.4,
    base:  0.3  + Math.random() * 0.68,
    spd:   0.4  + Math.random() * 2.2,
    phi:   Math.random() * Math.PI * 2,
    warm:  Math.random() < 0.12,
  }));

  // A handful of "shooting star" candidates
  let shooters = [];
  function maybeShoot() {
    if (Math.random() < 0.004 && shooters.length < 2) {
      shooters.push({
        x: Math.random() * 0.6 + 0.1,
        y: Math.random() * 0.3,
        vx: (0.004 + Math.random() * 0.006),
        vy: (0.002 + Math.random() * 0.003),
        life: 1, decay: 0.025 + Math.random() * 0.02,
      });
    }
    shooters = shooters.filter(s => s.life > 0);
  }

  let t = 0;
  function draw() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    t += 0.007;

    // Twinkling stars
    stars.forEach(s => {
      const a = s.base * (0.5 + 0.5 * Math.sin(t * s.spd + s.phi));
      ctx.beginPath();
      ctx.arc(s.x * cv.width, s.y * cv.height, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.warm
        ? `rgba(255,215,140,${a})`
        : `rgba(210,220,255,${a})`;
      ctx.fill();
    });

    // Shooting stars
    maybeShoot();
    shooters.forEach(s => {
      const x1 = s.x * cv.width;
      const y1 = s.y * cv.height;
      const x2 = x1 - s.vx * cv.width  * 18 * (1 - s.life);
      const y2 = y1 - s.vy * cv.height * 18 * (1 - s.life);
      const grad = ctx.createLinearGradient(x1, y1, x2, y2);
      grad.addColorStop(0,   `rgba(255,245,210,${s.life * 0.85})`);
      grad.addColorStop(1,   `rgba(255,245,210,0)`);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.strokeStyle = grad;
      ctx.lineWidth   = 1.5;
      ctx.stroke();
      s.x += s.vx; s.y += s.vy; s.life -= s.decay;
    });

    requestAnimationFrame(draw);
  }
  draw();
})();

// ══ LANGUAGE PREFERENCE ═══════════════════════════════════════════════
const stored = localStorage.getItem(LS_KEY);

if (stored) {
  const banner = document.getElementById('return-banner');
  const title  = document.getElementById('rb-title');
  const sub    = document.getElementById('rb-sub');
  const link   = document.getElementById('rb-link');

  if (stored === 'nl') {
    title.textContent = 'Welkom terug!';
    sub.textContent   = 'Je taalvoorkeur staat op Nederlands.';
    link.textContent  = 'Doorgaan in het Nederlands →';
    link.href         = NL_URL;
    document.getElementById('badge-nl').style.display = 'block';
  } else {
    title.textContent = 'Welcome back!';
    sub.textContent   = 'Your language preference is set to English.';
    link.textContent  = 'Continue in English →';
    link.href         = EN_URL;
    document.getElementById('badge-en').style.display = 'block';
  }

  banner.classList.add('show');
  requestAnimationFrame(() => requestAnimationFrame(() => banner.classList.add('visible')));

  const sw = document.getElementById('switch-row');
  sw.style.display = 'block';
}

function saveLang(lang) { localStorage.setItem(LS_KEY, lang); }
function clearLang()     { localStorage.removeItem(LS_KEY); location.reload(); }


// ══ ANIMATION HELPERS ═════════════════════════════════════════════════
function reveal(id, delay) {
  setTimeout(() => {
    const el = document.getElementById(id);
    if (el) el.classList.add('vis');
  }, delay);
}

// ══ TYPEWRITER ════════════════════════════════════════════════════════
function typewriter(text, el, cursor, done) {
  let i = 0;
  function tick() {
    if (i < text.length) {
      el.textContent += text[i];
      const ch = text[i++];
      const wait = (ch === '.' || ch === ',' || ch === '!') ? 280
                 : 44 + Math.random() * 26 - 8;
      setTimeout(tick, wait);
    } else {
      setTimeout(() => {
        cursor.style.animation = 'none';
        cursor.style.opacity   = '0';
        if (done) done();
      }, 950);
    }
  }
  tick();
}

// ══ ENTRANCE SEQUENCE ═════════════════════════════════════════════════
const BASE = stored ? 80 : 300;

reveal('flag-row',  BASE);
reveal('site-name', BASE + 260);

setTimeout(() => {
  document.getElementById('quote-block').classList.add('vis');
  typewriter(
    QUOTE,
    document.getElementById('typed'),
    document.getElementById('cursor'),
    () => {
      reveal('quote-attr',  220);
      reveal('divider',     450);
      reveal('choose-lbl',  680);
      reveal('lang-grid',   900);
      if (stored) reveal('switch-row', 1100);
    }
  );
}, BASE + 740);
</script>
