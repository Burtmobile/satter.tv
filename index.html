<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bert Satter - Portfolio</title>
    <style>
        /* Basis Instellingen */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 40px 0;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            margin-bottom: 50px;
        }

        /* === FOTO / AVATAR INSTELLINGEN === */
        .avatar {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            background-color: #eee;
            position: relative;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Focus op het gezicht */
            object-position: 50% 25%;
            /* Inzoomen voor de close-up */
            transform: scale(2.0);
            transform-origin: 50% 25%;
            /* Filter voor een zachtere uitstraling */
            filter: brightness(1.05) contrast(0.95) saturate(1.1) blur(0.3px);
            transition: all 0.3s ease;
        }

        /* Content Sectie */
        .container {
            max-width: 800px;
            width: 90%
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 {
            margin-top: 0;
            color: #1e3c72;
        }

        p {
            line-height: 1.6;
            font-size: 1.1em;
        }

        .tagline {
            font-style: italic;
            color: #666;
        }
    </style>
</head>
<body>

    <header>
        <div class="avatar" id="avatar-circle">
            <!-- Zorg dat de foto in dezelfde map staat met deze exact naam -->
            <img src="Bert van MargotJPG.jpg" alt="Bert Satter">
        </div>
    </header>

    <div class="container">
        <h1>Bert Satter</h1>
        <p class="tagline">"Klaar voor de volgende ronde."</p>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        <p>
            Welkom op mijn website. Gebruik deze ruimte om iets over jezelf, 
            je passies of je werkzaamheden te vertellen.
        </p>
    </div>

</body>
</html>
